<!--
  Legends EOR — Salary Benchmarking embed (white-label)
  Two ways to embed. Pick ONE per page.

  NOTE: after the legendseor.com domain flip, update the iframe src and the
  ALLOWED list below (the ondigitalocean.app entries can then be removed).
-->

<!-- ============================================================
     OPTION A — auto-height (recommended for normal page content)
     The iframe grows/shrinks to fit the tool exactly; no scrollbars.
     ============================================================ -->
<iframe
  id="legends-salary-benchmarking"
  src="https://legends-eor-2g8hb.ondigitalocean.app/embed/salary-benchmarking"
  title="Salary Benchmarking Tool"
  width="98%"
  style="width:100%; border:none; display:block; overflow:hidden;"
  scrolling="no"
  loading="lazy"
  allowfullscreen
></iframe>
<script>
(function () {
  'use strict';
  var MESSAGE_TYPE = 'legends-embed-resize';
  var HEIGHT_CHANGE_THRESHOLD = 3;
  var ALLOWED = [
    'https://legends-eor-2g8hb.ondigitalocean.app',
    'https://legendseor.com',
    'https://www.legendseor.com'
  ];
  var iframe = document.getElementById('legends-salary-benchmarking');
  if (!iframe) return;
  var lastHeight = 0;
  window.addEventListener('message', function (event) {
    if (ALLOWED.indexOf(event.origin) === -1) return;
    var data = event.data;
    if (!data || data.type !== MESSAGE_TYPE || typeof data.height !== 'number' || data.height < 0) return;
    var height = Math.round(data.height);
    if (Math.abs(height - lastHeight) < HEIGHT_CHANGE_THRESHOLD) return;
    lastHeight = height;
    iframe.style.height = height + 'px';
  });
})();
</script>

<!-- ============================================================
     OPTION B — fill a container (no script needed)
     The tool takes exactly the width and height of the div you
     place it in; content scrolls inside if the div is shorter.
     Size the wrapper div however you like.
     ============================================================ -->
<div style="width:100%; height:700px;">
  <iframe
    src="https://legends-eor-2g8hb.ondigitalocean.app/embed/salary-benchmarking?mode=fill"
    title="Salary Benchmarking Tool"
    style="width:100%; height:100%; border:none; display:block;"
    loading="lazy"
    allowfullscreen
  ></iframe>
</div>
